name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub release and upload archives

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so the changelog is complete

      # Same mise tool versions and the same `release` task that run locally.
      - uses: jdx/mise-action@v2

      - name: Release
        run: mise run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
