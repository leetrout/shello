name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install the exact tool versions from .mise.toml and reuse the same tasks
      # that run locally — one source of truth, no drift.
      - uses: jdx/mise-action@v2

      - name: Check formatting, vet, lint, test
        run: mise run check

      - name: Vulnerability scan
        run: mise run vulncheck

      - name: Build
        run: mise run build

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
