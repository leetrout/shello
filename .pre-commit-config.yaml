# Run with prek (fast Rust drop-in for pre-commit): `prek install`, `prek run --all-files`.
# This is the standard pre-commit config format; prek reads it unchanged.
# Go hooks shell out to mise tasks so tool versions match local + CI.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: go-fmt
        name: gofumpt/goimports/golines (via mise)
        entry: mise run fmt-check
        language: system
        pass_filenames: false
        files: \.go$
      - id: go-lint
        name: golangci-lint (via mise)
        entry: mise run lint
        language: system
        pass_filenames: false
        files: \.go$
      - id: go-test
        name: go test (via mise)
        entry: mise run test
        language: system
        pass_filenames: false
        files: \.go$
